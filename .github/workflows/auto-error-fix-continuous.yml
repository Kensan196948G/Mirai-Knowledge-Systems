name: 🤖 自動エラー検知・修復システム（5分間隔・無限ループ）

on:
  # ✅ 営業時間のみ実行（月-金、9-18時の毎正時）
  # 重複チェック実装により安全に再有効化（2026-02-06）
  schedule:
    - cron: '0 9-18 * * 1-5'  # 月-金、9-18時（10回/日）

  # 手動トリガー（デバッグ・検証用）
  workflow_dispatch:
    inputs:
      max_loops:
        description: '最大ループ回数（デフォルト: 15）'
        required: false
        default: '15'
      create_issue:
        description: 'Issue作成（yes/no）'
        required: false
        default: 'yes'

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'
  MAX_LOOPS: 15
  MKS_ENV: test
  MKS_SECRET_KEY: test-secret-key-for-ci
  MKS_JWT_SECRET_KEY: test-jwt-secret-key-for-ci
  MKS_CORS_ORIGINS: http://localhost:5100

jobs:
  auto-error-detection-and-fix:
    name: エラー自動検知・修復（15回ループ）
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      checks: write
      statuses: write
      issues: write  # Issueの作成に必要

    steps:
      - name: チェックアウト
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Python環境セットアップ
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 依存関係インストール
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          if [ -f requirements-test.txt ]; then
            pip install -r requirements-test.txt
          fi
          # Playwrightブラウザインストール（python -m で確実にPATH解決）
          python -m playwright install --with-deps chromium

      - name: PostgreSQL起動（Docker）
        run: |
          docker run -d \
            --name postgres \
            -e POSTGRES_USER=mks_user \
            -e POSTGRES_PASSWORD=mks_password \
            -e POSTGRES_DB=mks_db \
            -p 5432:5432 \
            postgres:16-alpine

          # PostgreSQL起動待機
          for i in {1..30}; do
            if docker exec postgres pg_isready -U mks_user; then
              echo "PostgreSQL is ready!"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done

      - name: Redis起動（Docker）
        run: |
          docker run -d \
            --name redis \
            -p 6379:6379 \
            redis:7-alpine

          # Redis起動待機
          sleep 5

      - name: データベース初期化
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://mks_user:mks_password@localhost:5432/mks_db
          REDIS_URL: redis://localhost:6379/0
          MKS_ENV: test
          MKS_SECRET_KEY: test-secret-key-for-ci
          MKS_JWT_SECRET_KEY: test-jwt-secret-key-for-ci
          MKS_CORS_ORIGINS: http://localhost:5100
        run: |
          python -c "from app_v2 import db, app; app.app_context().push(); db.create_all(); print('Database initialized')" || echo "Database already exists"

      - name: エラー検知・修復ループ（15回）
        id: error_fix_loop
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://mks_user:mks_password@localhost:5432/mks_db
          REDIS_URL: redis://localhost:6379/0
          PGHOST: localhost
          PGPORT: 5432
          MKS_PORT: 5100
          MKS_ENV: test
          MKS_SECRET_KEY: test-secret-key-for-ci
          MKS_JWT_SECRET_KEY: test-jwt-secret-key-for-ci
          MKS_CORS_ORIGINS: http://localhost:5100
          MKS_SKIP_HTTP_CHECK: true
        run: |
          echo "==================================="
          echo "エラー自動検知・修復開始"
          echo "最大ループ回数: ${{ github.event.inputs.max_loops || env.MAX_LOOPS }}"
          echo "==================================="
          echo ""

          # ループカウンター
          LOOP_COUNT=0
          MAX_LOOPS=${{ github.event.inputs.max_loops || env.MAX_LOOPS }}
          ERROR_COUNT=0
          FIX_COUNT=0

          # 結果ファイル
          RESULT_FILE="${GITHUB_WORKSPACE}/error_fix_results.txt"
          echo "# エラー検知・修復ログ" > "$RESULT_FILE"
          echo "実行日時: $(date '+%Y-%m-%d %H:%M:%S')" >> "$RESULT_FILE"
          echo "最大ループ回数: ${MAX_LOOPS}" >> "$RESULT_FILE"
          echo "" >> "$RESULT_FILE"

          while [ $LOOP_COUNT -lt $MAX_LOOPS ]; do
            LOOP_COUNT=$((LOOP_COUNT + 1))
            echo "----------------------------------------"
            echo "ループ ${LOOP_COUNT}/${MAX_LOOPS}"
            echo "----------------------------------------"
            echo "## ループ ${LOOP_COUNT}/${MAX_LOOPS}" >> "$RESULT_FILE"

            # 1. ヘルスチェック実行
            echo "[STEP 1] ヘルスチェック実行中..."
            if python scripts/health_monitor.py > health_check.log 2>&1; then
              echo "✓ ヘルスチェック完了"
              cat health_check.log >> "$RESULT_FILE"
            else
              echo "✗ ヘルスチェックでエラー検出"
              ERROR_COUNT=$((ERROR_COUNT + 1))
              cat health_check.log >> "$RESULT_FILE"
            fi

            # 2. テスト実行（エラー検知）
            echo "[STEP 2] テスト実行中..."
            if pytest tests/ -v --tb=short > test_results.log 2>&1; then
              echo "✓ 全テスト合格"
              echo "### テスト結果: 合格" >> "$RESULT_FILE"
            else
              echo "✗ テスト失敗を検出"
              ERROR_COUNT=$((ERROR_COUNT + 1))
              echo "### テスト結果: 失敗" >> "$RESULT_FILE"
              grep -A 3 "FAILED" test_results.log >> "$RESULT_FILE" || true

              # 3. 自動修復試行
              echo "[STEP 3] 自動修復を試行中..."
              if python scripts/auto_fix_daemon.py --once >> "$RESULT_FILE" 2>&1; then
                echo "✓ 自動修復完了"
                FIX_COUNT=$((FIX_COUNT + 1))
              else
                echo "✗ 自動修復失敗"
                echo "### 自動修復: 失敗" >> "$RESULT_FILE"
              fi
            fi

            # 4. ログファイル確認
            echo "[STEP 4] ログファイル確認中..."
            if [ -f logs/app.log ]; then
              ERROR_LINES=$(grep -i "error\|exception\|critical" logs/app.log | tail -10 || true)
              if [ -n "$ERROR_LINES" ]; then
                echo "✗ ログにエラーを検出"
                ERROR_COUNT=$((ERROR_COUNT + 1))
                echo "### ログエラー:" >> "$RESULT_FILE"
                echo "$ERROR_LINES" >> "$RESULT_FILE"
              else
                echo "✓ ログにエラーなし"
              fi
            fi

            echo ""
            echo "ループ ${LOOP_COUNT} 完了 - エラー: ${ERROR_COUNT}, 修復: ${FIX_COUNT}"
            echo "" >> "$RESULT_FILE"

            # 最後のループでなければ5秒待機
            if [ $LOOP_COUNT -lt $MAX_LOOPS ]; then
              sleep 5
            fi
          done

          echo "==================================="
          echo "エラー検知・修復完了"
          echo "総ループ回数: ${LOOP_COUNT}"
          echo "検出エラー数: ${ERROR_COUNT}"
          echo "修復実行回数: ${FIX_COUNT}"
          echo "==================================="

          # サマリーを結果ファイルに追加
          echo "" >> "$RESULT_FILE"
          echo "---" >> "$RESULT_FILE"
          echo "## サマリー" >> "$RESULT_FILE"
          echo "- 総ループ回数: ${LOOP_COUNT}" >> "$RESULT_FILE"
          echo "- 検出エラー数: ${ERROR_COUNT}" >> "$RESULT_FILE"
          echo "- 修復実行回数: ${FIX_COUNT}" >> "$RESULT_FILE"

          # GitHub環境変数に設定
          echo "error_count=${ERROR_COUNT}" >> $GITHUB_OUTPUT
          echo "fix_count=${FIX_COUNT}" >> $GITHUB_OUTPUT
          echo "loop_count=${LOOP_COUNT}" >> $GITHUB_OUTPUT

      - name: 結果レポート生成
        id: generate_report
        run: |
          REPORT_FILE="${GITHUB_WORKSPACE}/error_fix_report.md"

          cat > "$REPORT_FILE" << 'REPORT_EOF'
          # 🤖 自動エラー検知・修復レポート

          **実行日時:** $(date '+%Y-%m-%d %H:%M:%S UTC')
          **ワークフローRun:** #${{ github.run_number }}
          **コミット:** ${{ github.sha }}

          ## 📊 実行結果

          | 項目 | 値 |
          |------|-----|
          | ループ回数 | ${{ steps.error_fix_loop.outputs.loop_count }} / ${{ github.event.inputs.max_loops || env.MAX_LOOPS }} |
          | 検出エラー数 | ${{ steps.error_fix_loop.outputs.error_count }} |
          | 修復実行回数 | ${{ steps.error_fix_loop.outputs.fix_count }} |

          ## 📋 詳細ログ

          REPORT_EOF

          # 詳細ログを追加
          cat "${GITHUB_WORKSPACE}/error_fix_results.txt" >> "$REPORT_FILE" || echo "ログファイルが見つかりません" >> "$REPORT_FILE"

          echo "report_path=${REPORT_FILE}" >> $GITHUB_OUTPUT

      - name: 重複Issue確認
        id: dedup
        if: always() && github.event.inputs.create_issue != 'no'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const today = new Date().toISOString().split('T')[0];
              const errorCount = '${{ steps.error_fix_loop.outputs.error_count }}';

              console.log(`[Dedup] Checking for duplicate issues on ${today}...`);
              console.log(`[Dedup] Error count: ${errorCount}`);

              // エラー数が0の場合は重複チェック不要（作成しない）
              if (errorCount === '0' || errorCount === '') {
                core.setOutput('duplicate', 'false');
                core.setOutput('skip_reason', 'no_errors');
                console.log('[Dedup] No errors detected. Skipping issue creation.');
                return;
              }

              // 同日の auto-fix ラベル付きIssueを検索
              console.log('[Dedup] Fetching existing issues with auto-fix label...');
              const issues = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: 'auto-fix',
                state: 'open',
                per_page: 100
              });

              console.log(`[Dedup] Found ${issues.data.length} open issues with auto-fix label`);

              // 同日 + 同じエラー数のIssueが存在するか確認
              const duplicate = issues.data.find(i => {
                const titleMatch = i.title.includes(today) && i.title.includes(`エラー${errorCount}件`);
                if (titleMatch) {
                  console.log(`[Dedup] Potential duplicate: #${i.number} - ${i.title}`);
                }
                return titleMatch;
              });

              if (duplicate) {
                core.setOutput('duplicate', 'true');
                core.setOutput('skip_reason', 'duplicate_found');
                console.log(`[Dedup] ✗ Duplicate issue found: #${duplicate.number} - ${duplicate.title}`);
                console.log('[Dedup] Skipping issue creation to prevent duplicates.');
              } else {
                core.setOutput('duplicate', 'false');
                core.setOutput('skip_reason', 'none');
                console.log('[Dedup] ✓ No duplicate issue found. Proceeding with issue creation.');
              }
            } catch (error) {
              // API失敗時はフェイルセーフ: Issue作成をスキップ
              console.error(`[Dedup] Error during duplicate check: ${error.message}`);
              core.setOutput('duplicate', 'true');
              core.setOutput('skip_reason', 'api_error');
              console.log('[Dedup] ⚠️ Skipping issue creation due to API error (fail-safe).');
            }

      - name: GitHub Issueに結果を投稿
        # Issue作成条件:
        # - always(): 前ステップの失敗に関わらず実行
        # - create_issue != 'no': 手動トリガーでのスキップ可能
        # - duplicate == 'false': 重複Issueではない
        # - skip_reason == 'none': エラー0件、重複、API失敗でない
        if: >-
          always() &&
          github.event.inputs.create_issue != 'no' &&
          steps.dedup.outputs.duplicate == 'false' &&
          steps.dedup.outputs.skip_reason == 'none'
        uses: actions/github-script@v7
        with:
          script: |
            const errorCount = '${{ steps.error_fix_loop.outputs.error_count }}';
            const fixCount = '${{ steps.error_fix_loop.outputs.fix_count }}';
            const loopCount = '${{ steps.error_fix_loop.outputs.loop_count }}';
            const maxLoops = '${{ github.event.inputs.max_loops || env.MAX_LOOPS }}';

            // サマリーのみのIssue本文（65KB制限対策）
            const reportBody = `# 🤖 自動エラー検知・修復レポート

            **実行日時:** ${new Date().toISOString()}
            **ワークフローRun:** #${{ github.run_number }}
            **コミット:** \`${{ github.sha }}\`

            ## 📊 実行結果

            | 項目 | 値 |
            |------|-----|
            | ループ回数 | ${loopCount} / ${maxLoops} |
            | 検出エラー数 | ${errorCount} |
            | 修復実行回数 | ${fixCount} |

            ## 📋 詳細ログ

            詳細ログは以下のアーティファクトからダウンロードしてください：

            📦 **アーティファクト名**: \`error-fix-results-${{ github.run_number }}\`

            1. [Actions タブ](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) を開く
            2. 下部の「Artifacts」セクションから \`error-fix-results-${{ github.run_number }}\` をダウンロード
            3. \`error_fix_report.md\` に全ループの詳細ログが記録されています

            ---

            🤖 Generated by [GitHub Actions Workflow](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;

            // Issueタイトル
            const title = errorCount > 0
              ? `[自動修復] エラー${errorCount}件検出・修復${fixCount}件実行 (${new Date().toISOString().split('T')[0]})`
              : `[自動修復] 正常動作確認 (${new Date().toISOString().split('T')[0]})`;

            // Issueラベル
            const labels = errorCount > 0 ? ['auto-fix', 'error-detected'] : ['auto-fix', 'healthy'];

            // Issue作成
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: reportBody,
              labels: labels
            });

            console.log('Issue作成完了:', issue.data.html_url);

      - name: Artifactに結果をアップロード
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: error-fix-results-${{ github.run_number }}
          path: |
            error_fix_results.txt
            error_fix_report.md
            backend/logs/*.log
          retention-days: 30

      - name: クリーンアップ
        if: always()
        run: |
          docker stop postgres redis || true
          docker rm postgres redis || true

      - name: 次回実行までスリープ（オプション）
        if: false  # 通常は無効（cronで30分後に再実行）
        run: |
          echo "次回実行まで30分待機..."
          sleep 1800
