name: 🤖 PR自動エラー修復

on:
  workflow_run:
    workflows: ["Backend CI (Improved)", "Frontend Tests", "Mirai Knowledge Systems CI/CD"]
    types: [completed]
    branches-ignore: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  auto-fix-pr-errors:
    name: PR自動修復
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest

    steps:
      - name: 📋 ワークフロー情報を取得
        id: workflow_info
        run: |
          echo "branch=${{ github.event.workflow_run.head_branch }}" >> $GITHUB_OUTPUT
          echo "workflow=${{ github.event.workflow_run.name }}" >> $GITHUB_OUTPUT
          echo "run_id=${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT

      - name: 📥 PRブランチをチェックアウト
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Python環境セットアップ
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 依存関係インストール
        run: |
          pip install --break-system-packages black isort flake8 pytest
          if [ -f backend/requirements.txt ]; then
            pip install -r backend/requirements.txt --break-system-packages
          fi

      - name: 🔍 エラー検知・自動修復
        id: auto_fix
        run: |
          echo "=== エラー検知開始 ==="

          # 1. Lintエラー修復
          echo "[STEP 1] Lint修復中..."
          black backend/ || true
          isort backend/ || true

          # 2. Import エラー検知
          echo "[STEP 2] Import エラー確認中..."
          python -c "import sys; sys.path.insert(0, 'backend'); from app_v2 import app" 2>&1 | tee import_errors.log || true

          # 3. 構文エラー検知
          echo "[STEP 3] 構文エラー確認中..."
          python -m py_compile backend/app_v2.py 2>&1 | tee syntax_errors.log || true

          # 4. テスト実行（軽量チェック）
          echo "[STEP 4] テスト実行中..."
          cd backend
          pytest tests/unit/ -v --tb=short -x --maxfail=3 > ../test_results.log 2>&1 || true
          cd ..

          # 5. 変更確認
          if [ -n "$(git status --porcelain)" ]; then
            echo "fixed=true" >> $GITHUB_OUTPUT
            echo "修復実行（変更あり）"
            git status --short
          else
            echo "fixed=false" >> $GITHUB_OUTPUT
            echo "修復不要（変更なし）"
          fi

      - name: 💾 修正をコミット
        if: steps.auto_fix.outputs.fixed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "fix: CI自動修復 - Lint/Import エラー修正" \
                     -m "" \
                     -m "自動修復内容:" \
                     -m "- black による自動フォーマット" \
                     -m "- isort による import 整理" \
                     -m "" \
                     -m "ワークフロー: ${{ steps.workflow_info.outputs.workflow }}" \
                     -m "ブランチ: ${{ steps.workflow_info.outputs.branch }}" \
                     -m "" \
                     -m "🤖 Generated by GitHub Actions"
          git push

      - name: 💬 PRにコメント投稿（修復成功）
        if: steps.auto_fix.outputs.fixed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.workflow_run.pull_requests[0];
            if (!pr) {
              console.log('No PR found');
              return;
            }

            const comment = `🤖 **自動修復を実行しました**

            CI/CDテストが失敗したため、以下の修正を自動適用しました：

            ✅ **実行済み修復**:
            - Python コードフォーマット（black）
            - Import 整理（isort）

            📋 **ワークフロー情報**:
            - トリガー: ${{ steps.workflow_info.outputs.workflow }}
            - ブランチ: ${{ steps.workflow_info.outputs.branch }}
            - Run ID: #${{ steps.workflow_info.outputs.run_id }}

            変更内容を確認してください。テストが再実行されます。`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: comment
            });

      - name: 💬 PRにコメント投稿（修復不要）
        if: steps.auto_fix.outputs.fixed == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.workflow_run.pull_requests[0];
            if (!pr) {
              console.log('No PR found');
              return;
            }

            const comment = `🤖 **自動修復を確認しました**

            CI/CDテストが失敗しましたが、自動修復可能なエラーは検出されませんでした。

            ❌ **検出されなかったエラー**:
            - Lint エラー（black/isort）
            - Import エラー

            🔍 **次のステップ**:
            手動でエラーログを確認して修正してください。

            📋 **ワークフロー情報**:
            - トリガー: ${{ steps.workflow_info.outputs.workflow }}
            - ブランチ: ${{ steps.workflow_info.outputs.branch }}
            - Run ID: #${{ steps.workflow_info.outputs.run_id }}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: comment
            });

      - name: 📊 アーティファクト保存
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: auto-fix-logs-${{ steps.workflow_info.outputs.branch }}-${{ github.run_number }}
          path: |
            import_errors.log
            syntax_errors.log
            test_results.log
          retention-days: 7
          if-no-files-found: ignore
